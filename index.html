<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huvytas Pulse | Campaign Monitor</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #8CC63F; 
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }
        /* Este bloque tapa la barra de Power BI sin mover el reporte */
        .blocker {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 36px;
            background-color: #8CC63F; /* Mismo verde de tu marca */
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe 
            src="https://app.powerbi.com/view?r=eyJrIjoiYTBiMWUzNjMtZjNhMi00Nzg0LTkyNGEtMTI2NGE1YzQyZmFkIiwidCI6IjFlM2E0ZjcxLWQxMmUtNGM0Yy05NmQ4LTI2MDNiZDY1MmUzNSJ9&navContentPaneEnabled=false" 
            allowFullScreen="true">
        </iframe>
        <div class="blocker"></div>
    </div>
</body>
</html>

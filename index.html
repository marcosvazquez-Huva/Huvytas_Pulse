<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huvytas Pulse | Customer Access</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-image: url('home.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        
        #auth-container { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: rgba(0, 0, 0, 0.5); 
        }
        
        .login-card { 
            background: #ffffff; 
            color: #333; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 90%; 
            max-width: 400px; 
        }
        
        .login-card h2 { margin-bottom: 5px; color: #000; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .login-card p { margin-bottom: 25px; color: #555; font-size: 14px; font-style: italic; }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; color: #333; background-color: #f9f9f9; }
        input:focus { border-color: #88C24E; outline: none; }

        button#btn-login { 
            width: 100%; padding: 15px; background-color: #88C24E; color: #fff; border: none; 
            border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; 
        }
        button#btn-login:hover { background-color: #6da33c; }

        #dashboard-container { 
            display: none; 
            height: 100vh; 
            width: 100vw; 
            flex-direction: column; 
            background-color: #000; 
            overflow: hidden; 
        }
        
        .nav-bar { 
            background: #000; padding: 10px 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #333; color: #fff; 
            z-index: 100;
        }
        
        .nav-bar span { font-weight: bold; font-size: 14px; letter-spacing: 1px; }
        .btn-logout { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; }
        
        .iframe-wrapper { 
            flex: 1; 
            width: 100%; 
            position: relative; 
            overflow: hidden; 
        }
        
        iframe { 
            width: 100%; 
            height: calc(100% + 90px); /* Recorte profundo para ocultar menús de Power BI */
            border: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
            margin-bottom: -90px; 
        }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="login-card">
            <h2>HuvytasPulse</h2>
            <p>Turning Metrics into Results</p>
            <input type="email" id="email" placeholder="User">
            <input type="password" id="password" placeholder="Password">
            <button id="btn-login" onclick="login()">Login</button>
        </div>
    </div>

    <div id="dashboard-container">
        <div class="nav-bar">
            <span>HUVYTASPULSE</span>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>
        <div class="iframe-wrapper">
            <iframe 
                id="powerbi-frame"
                src="https://app.powerbi.com/view?r=eyJrIjoiYTBiMWUzNjMtZjNhMi00Nzg0LTkyNGEtMTI2NGE1YzQyZmFkIiwidCI6IjFlM2E0ZjcxLWQxMmUtNGM0Yy05NmQ4LTI2MDNiZDY1MmUzNSJ9&pageName=558a467bceb79caaaed8&navContentPaneEnabled=false&filterPaneEnabled=false&chromeless=true" 
                allowFullScreen="true">
            </iframe>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArR-XvkK4sBD-I537ucX1pnIODMU0H2ks",
            authDomain: "huvytas-pulse.firebaseapp.com",
            projectId: "huvytas-pulse",
            storageBucket: "huvytas-pulse.firebasestorage.app",
            messagingSenderId: "46494759312",
            appId: "1:46494759312:web:67e90e532163224ba2db15"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 1. LOGIN CON PERSISTENCIA DE SESIÓN
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            if(!email || !pass) { alert("Please complete all fields."); return; }

            auth.setPersistence(firebase.auth.Auth.Persistence.SESSION)
                .then(() => {
                    return auth.signInWithEmailAndPassword(email, pass);
                })
                .catch(error => {
                    alert("Please verify your email and password.");
                });
        }

        function logout() { 
            auth.signOut(); 
        }

        // 2. CONTROL DE INACTIVIDAD (1 HORA)
        let inactivityTimer;

        function resetTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(logoutDueToInactivity, 1800000); // 30 minutos
        }

        function logoutDueToInactivity() {
            if (auth.currentUser) {
                alert("Session closed due to inactivity.");
                logout();
            }
        }

        // Eventos para resetear el reloj de inactividad
        window.onmousemove = resetTimer;
        window.onmousedown = resetTimer; 
        window.onclick = resetTimer;     
        window.onkeypress = resetTimer;   
        window.scroll = resetTimer;

        auth.onAuthStateChanged(user => {
            const authDiv = document.getElementById('auth-container');
            const dashDiv = document.getElementById('dashboard-container');
            
            if (user) {
                authDiv.style.display = 'none';
                dashDiv.style.display = 'flex';
                document.body.style.backgroundImage = 'none';
                document.body.style.backgroundColor = '#000';
                resetTimer(); // Iniciar reloj al entrar
            } else {
                authDiv.style.display = 'flex';
                dashDiv.style.display = 'none';
                document.body.style.backgroundImage = "url('home.jpg')";
                document.getElementById('email').value = "";
                document.getElementById('password').value = "";
                clearTimeout(inactivityTimer); // Detener reloj al salir
            }
        });
    </script>
</body>
</html>

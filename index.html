<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huvytas Pulse | Customer Access</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 1. Fondo con imagen fija home.jpg */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-image: url('home.jpg'); /* Asegúrate de que home.jpg esté en la misma carpeta */
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Fija la imagen para que no haga scroll */
            color: #fff; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* Contenedor de Login */
        #auth-container { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            /* Quitamos el degradado para que se vea la imagen de fondo */
            background: rgba(0, 0, 0, 0.5); /* Añade una capa oscura ligera para contrastar la tarjeta */
        }
        
        .login-card { 
            background: #ffffff; 
            color: #333; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 100%; 
            max-width: 400px; 
        }
        
        .login-card h2 { margin-bottom: 5px; color: #000; font-size: 28px; font-weight: 700; }
        
        /* 2. Subtítulo actualizado: Turning Metrics into Results */
        .login-card p { margin-bottom: 25px; color: #555; font-size: 15px; font-style: italic; }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; color: #333; background-color: #f9f9f9; }
        input:focus { border-color: #88C24E; outline: none; box-shadow: 0 0 5px rgba(136, 194, 78, 0.5); }

        /* 3. Botón actualizado: Texto "Login" y color verde #88C24E */
        button#btn-login { 
            width: 100%; 
            padding: 15px; 
            background-color: #88C24E; /* Verde Huvytas */
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 700; 
            text-transform: uppercase; /* Texto en mayúsculas para más fuerza */
            letter-spacing: 1px;
            transition: 0.3s background-color; 
        }
        button#btn-login:hover { background-color: #6da33c; /* Un verde un poco más oscuro al pasar el mouse */ }

        /* Contenedor del Reporte */
        #dashboard-container { display: none; height: 100vh; flex-direction: column; background-color: #000; }
        .nav-bar { background: #000; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; color: #fff; }
        .nav-bar span { font-weight: bold; letter-spacing: 1px; }
        .btn-logout { background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-logout:hover { background-color: #ff1a1a; }
        
        iframe { width: 100%; flex: 1; border: none; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="login-card">
            <h2>Huvytas Pulse</h2>
            <p>Turning Metrics into Results</p>
            <input type="email" id="email" placeholder="User">
            <input type="password" id="password" placeholder="Password">
            <button id="btn-login" onclick="login()">Login</button>
        </div>
    </div>

    <div id="dashboard-container">
        <div class="nav-bar">
            <span>HUVYTAS PULSE</span>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>
        <iframe 
            id="powerbi-frame"
            src="https://app.powerbi.com/view?r=eyJrIjoiYTBiMWUzNjMtZjNhMi00Nzg0LTkyNGEtMTI2NGE1YzQyZmFkIiwidCI6IjFlM2E0ZjcxLWQxMmUtNGM0Yy05NmQ4LTI2MDNiZDY1MmUzNSJ9" 
            allowFullScreen="true">
        </iframe>
    </div>

    <script>
        // Configuración de tu Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyArR-XvkK4sBD-I537ucX1pnIODMU0H2ks",
            authDomain: "huvytas-pulse.firebaseapp.com",
            projectId: "huvytas-pulse",
            storageBucket: "huvytas-pulse.firebasestorage.app",
            messagingSenderId: "46494759312",
            appId: "1:46494759312:web:67e90e532163224ba2db15"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Función para entrar
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if(!email || !pass) {
                alert("Please complete all fields.");
                return;
            }

            auth.signInWithEmailAndPassword(email, pass)
                .catch(error => {
                    alert("Please verify your email and password.");
                    console.error(error);
                });
        }

        // Función para salir
        function logout() {
            auth.signOut();
        }

        // Monitor de estado de sesión
        auth.onAuthStateChanged(user => {
            const authDiv = document.getElementById('auth-container');
            const dashDiv = document.getElementById('dashboard-container');

            if (user) {
                authDiv.style.display = 'none';
                dashDiv.style.display = 'flex';
                // Cambiamos el fondo para que el reporte se vea limpio
                document.body.style.backgroundImage = 'none';
                document.body.style.backgroundColor = '#000';
            } else {
                authDiv.style.display = 'flex';
                dashDiv.style.display = 'none';
                // Restauramos el fondo de imagen al cerrar sesión
                document.body.style.backgroundImage = "url('home.jpg')";
                document.body.style.backgroundSize = 'cover';
                
                // Limpiar campos al cerrar sesión
                document.getElementById('email').value = "";
                document.getElementById('password').value = "";
            }
        });
    </script>
</body>
</html>
